<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visual Novel</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="game-shell">
    <main class="story-frame" aria-live="polite">
      <header class="topbar">
        <nav class="top-actions" aria-label="Game tools">
          <button id="restartButton" type="button" title="Restart">Restart</button>
        </nav>
      </header>

      <section id="storyCard" class="story-card">
        <div id="nodeText" class="node-text"></div>
        <form id="memoryForm" class="memory-form hidden"></form>
        <div id="choices" class="choices"></div>
      </section>
    </main>

    <script src="story-engine.js"></script>
    <script src="story-data.js"></script>
    <script src="game.js"></script>
  </body>
</html>
